<svg xmlns="http://www.w3.org/2000/svg" width="680" height="520" viewBox="0 0 680 520" style="background:#0d1117;font-family:monospace">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Browser -->
<rect x="30" y="20" width="620" height="80" rx="10" fill="#0a1628" stroke="#00d4ff" stroke-width="0.8"/>
<text x="340" y="50" text-anchor="middle" fill="#00d4ff" font-size="14" font-weight="600">Browser</text>
<text x="340" y="72" text-anchor="middle" fill="#5a8fa8" font-size="12">Dashboard · CVE List · Monitor · Impersonation · Analytics</text>

<!-- Arrow -->
<line x1="340" y1="100" x2="340" y2="135" stroke="#00d4ff" stroke-width="1" marker-end="url(#arrow)"/>
<text x="355" y="122" fill="#5a8fa8" font-size="11">HTTP</text>

<!-- Nginx -->
<rect x="230" y="135" width="220" height="52" rx="8" fill="#0a1f1a" stroke="#00ff88" stroke-width="0.8"/>
<text x="340" y="157" text-anchor="middle" fill="#00ff88" font-size="14" font-weight="600">Nginx</text>
<text x="340" y="175" text-anchor="middle" fill="#5a8fa8" font-size="12">Reverse proxy · Port 80</text>

<!-- Arrow -->
<line x1="340" y1="187" x2="340" y2="222" stroke="#00d4ff" stroke-width="1" marker-end="url(#arrow)"/>
<text x="355" y="209" fill="#5a8fa8" font-size="11">Proxy</text>

<!-- server.py -->
<rect x="190" y="222" width="300" height="52" rx="8" fill="#160d2e" stroke="#8b5cf6" stroke-width="0.8"/>
<text x="340" y="244" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="600">server.py</text>
<text x="340" y="262" text-anchor="middle" fill="#5a8fa8" font-size="12">Static files + REST API · Port 8004</text>

<!-- Three arrows from server.py -->
<line x1="220" y1="274" x2="130" y2="340" stroke="#00d4ff" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="274" x2="340" y2="340" stroke="#00d4ff" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="460" y1="274" x2="550" y2="340" stroke="#00d4ff" stroke-width="1" marker-end="url(#arrow)"/>

<!-- bridge.py -->
<rect x="30" y="340" width="200" height="52" rx="8" fill="#1a1200" stroke="#ffcc00" stroke-width="0.8"/>
<text x="130" y="362" text-anchor="middle" fill="#ffcc00" font-size="14" font-weight="600">bridge.py</text>
<text x="130" y="380" text-anchor="middle" fill="#5a8fa8" font-size="12">Domain scanner</text>

<!-- cve_lookup.py -->
<rect x="240" y="340" width="200" height="52" rx="8" fill="#1a1200" stroke="#ffcc00" stroke-width="0.8"/>
<text x="340" y="362" text-anchor="middle" fill="#ffcc00" font-size="14" font-weight="600">cve_lookup.py</text>
<text x="340" y="380" text-anchor="middle" fill="#5a8fa8" font-size="12">CVE scan engine</text>

<!-- NVD API -->
<rect x="450" y="340" width="200" height="52" rx="8" fill="#1a0a08" stroke="#ff6b00" stroke-width="0.8"/>
<text x="550" y="362" text-anchor="middle" fill="#ff6b00" font-size="14" font-weight="600">NIST NVD API</text>
<text x="550" y="380" text-anchor="middle" fill="#5a8fa8" font-size="12">External · CVE data</text>

<!-- Arrow cve to NVD -->
<line x1="440" y1="366" x2="450" y2="366" stroke="#00d4ff" stroke-width="1" marker-end="url(#arrow)"/>

<!-- results.json -->
<rect x="30" y="430" width="200" height="52" rx="8" fill="#111827" stroke="#2a5a72" stroke-width="0.8"/>
<text x="130" y="452" text-anchor="middle" fill="#e0f4ff" font-size="14" font-weight="600">results.json</text>
<text x="130" y="470" text-anchor="middle" fill="#5a8fa8" font-size="12">cti_output/</text>

<line x1="130" y1="392" x2="130" y2="430" stroke="#00d4ff" stroke-width="1" marker-end="url(#arrow)"/>
