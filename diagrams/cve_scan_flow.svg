<svg xmlns="http://www.w3.org/2000/svg" width="680" height="540" viewBox="0 0 680 540" style="background:#0d1117;font-family:monospace">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect x="160" y="20" width="360" height="52" rx="8" fill="#0a1628" stroke="#00d4ff" stroke-width="0.8"/>
<text x="340" y="42" text-anchor="middle" fill="#00d4ff" font-size="14" font-weight="600">User sets scan parameters</text>
<text x="340" y="60" text-anchor="middle" fill="#5a8fa8" font-size="12">Product · time range · min score · max results</text>
<line x1="340" y1="72" x2="340" y2="107" stroke="#00d4ff" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="200" y="107" width="280" height="52" rx="8" fill="#160d2e" stroke="#8b5cf6" stroke-width="0.8"/>
<text x="340" y="129" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="600">POST /api/cve/scan</text>
<text x="340" y="147" text-anchor="middle" fill="#5a8fa8" font-size="12">server.py calls NIST NVD API v2</text>
<line x1="340" y1="159" x2="340" y2="194" stroke="#00d4ff" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="100" y="194" width="480" height="52" rx="8" fill="#1a1200" stroke="#ffcc00" stroke-width="0.8"/>
<text x="340" y="216" text-anchor="middle" fill="#ffcc00" font-size="14" font-weight="600">Date range split into 90-day windows</text>
<text x="340" y="234" text-anchor="middle" fill="#5a8fa8" font-size="12">NVD hard limit · sequential requests with rate limiting</text>
<line x1="340" y1="246" x2="340" y2="281" stroke="#00d4ff" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="160" y="281" width="360" height="52" rx="8" fill="#1a0a08" stroke="#ff6b00" stroke-width="0.8"/>
<text x="340" y="303" text-anchor="middle" fill="#ff6b00" font-size="14" font-weight="600">Parse CVSS · apply score filter</text>
<text x="340" y="321" text-anchor="middle" fill="#5a8fa8" font-size="12">score ≥ min_score → keep · N/A + min &gt; 0 → skip</text>
<line x1="340" y1="333" x2="340" y2="368" stroke="#00d4ff" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="200" y="368" width="280" height="52" rx="8" fill="#111827" stroke="#2a5a72" stroke-width="0.8"/>
<text x="340" y="390" text-anchor="middle" fill="#e0f4ff" font-size="14" font-weight="600">Normalize results</text>
<text x="340" y="408" text-anchor="middle" fill="#5a8fa8" font-size="12">id · product · date · score · severity · vector</text>
<line x1="340" y1="420" x2="340" y2="455" stroke="#00d4ff" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="140" y="455" width="400" height="52" rx="8" fill="#0a1f1a" stroke="#00ff88" stroke-width="0.8"/>
<text x="340" y="477" text-anchor="middle" fill="#00ff88" font-size="14" font-weight="600">Browser ingests results</text>
<text x="340" y="495" text-anchor="middle" fill="#5a8fa8" font-size="12">Duplicate check → localStorage → table + charts update</text>
</svg>
